version: 1
backend:
  phases:
    build:
      commands:
        - npm install --cache .npm --prefer-offline
        - export CI=1
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
        - npx ampx generate outputs --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    build:
      commands:
        - npm run build
        - npm run seo:indexnow
  redirects:
    - source: /index
      target: /
      status: "301"
    - source: /index1
      target: /
      status: "301"
    - source: /index2
      target: /
      status: "301"
