      target: /
      status: "301"
    - source: /index6
      target: /
      status: "301"
    - source: /index7
      target: /
      status: "301"
    - source: /index8
      target: /
      status: "301"
    - source: /index9
      target: /
      status: "301"
    - source: /index10
      target: /
      status: "301"
    - source: /index11
      target: /
      status: "301"
    - source: /index12
